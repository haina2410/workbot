llm:
  model: "GLM-4.7"
  base_url: "https://mkp-api.fptcloud.com/v1"

enabled_crawlers: ["facebook"]

linkedin:
  filters:
    keywords: "Software Engineer"
    location: "Vietnam"
    date_posted: "past_week"
  max_jobs_per_run: 20
  max_pages: 5

facebook:
  group_urls:
    - "https://www.facebook.com/groups/ithotjobs.tuyendungit.vieclamcntt.susudev/?sorting_setting=CHRONOLOGICAL"
  target_posts: 10
  filter_remote_only: false
  max_jobs_per_run: 10
  use_llm: false

rate_limiting:
  min_delay: 2
  max_delay: 5
