llm:
  model: "GLM-4.7"
  base_url: "https://mkp-api.fptcloud.com/v1"

enabled_crawlers: ["linkedin"]

linkedin:
  filters:
    keywords: "Software Engineer"
    location: "Vietnam"
    date_posted: "past_week"
  max_jobs_per_run: 3
  max_pages: 1

facebook:
  group_urls: []
  target_posts: 25
  max_pages: 10
  filter_remote_only: false
  max_jobs_per_run: 20

rate_limiting:
  min_delay: 2
  max_delay: 5
