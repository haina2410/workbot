services:
  crawler:
    build: .
    container_name: jobs-crawler
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - BROWSERLESS_URL=http://browserless:3000
      - BROWSERLESS_TOKEN=${BROWSERLESS_TOKEN:-}
    depends_on:
      - browserless
    networks:
      - n8n-net

  browserless:
    image: ghcr.io/browserless/chromium
    container_name: browserless
    ports:
      - "3000:3000"
    environment:
      - TOKEN=${BROWSERLESS_TOKEN:-}
    networks:
      - n8n-net

networks:
  n8n-net:
    external: true
