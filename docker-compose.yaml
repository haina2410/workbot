services:
  crawler:
    build: .
    container_name: jobs-crawler
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - SELENIUM_URL=http://chrome:4444
    depends_on:
      - chrome
    networks:
      - n8n-net

  chrome:
    image: selenium/standalone-chrome
    container_name: chrome
    ports:
      - "4444:4444"
      - "7900:7900"  # noVNC — view browser at http://localhost:7900
    shm_size: "2g"
    networks:
      - n8n-net

networks:
  n8n-net:
    external: true
